<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Heart For You</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background:linear-gradient(135deg,#ffb6d9,#ffd6ea,#fff0f7);
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* Hearts Rain */
.heart{
    position:absolute;
    top:-20px;
    width:18px;
    height:18px;
    background:#ff4d88;
    transform:rotate(45deg);
    animation:fall linear infinite;
    opacity:.8;
}
.heart::before,
.heart::after{
    content:'';
    position:absolute;
    width:18px;
    height:18px;
    background:#ff4d88;
    border-radius:50%;
}
.heart::before{top:-9px;left:0;}
.heart::after{left:-9px;top:0;}

@keyframes fall{
    0%{transform:translateY(-10vh) rotate(45deg);}
    100%{transform:translateY(110vh) rotate(45deg);}
}

/* Sparkles */
.sparkle{
    position:absolute;
    color:white;
    font-size:20px;
    animation:blink 2s infinite;
}
@keyframes blink{
    0%,100%{opacity:.2;transform:scale(.8);}
    50%{opacity:1;transform:scale(1.4);}
}

.container{
    width:90%;
    max-width:460px;
    padding:35px;
    border-radius:30px;
    background:rgba(255,255,255,.18);
    backdrop-filter:blur(14px);
    text-align:center;
    box-shadow:0 10px 40px rgba(0,0,0,.15);
    z-index:2;
    animation:fadeUp 2s ease;
}

@keyframes fadeUp{
    from{opacity:0;transform:translateY(30px);}
    to{opacity:1;transform:translateY(0);}
}

.pic{
    width:180px;
    height:180px;
    border-radius:50%;
    overflow:hidden;
    margin:auto;
    border:6px solid white;
    box-shadow:0 0 25px rgba(255,255,255,.9);
    animation:heartbeat 1.2s infinite;
}

.pic img{
    width:100%;
    height:100%;
    object-fit:cover;
}

@keyframes heartbeat{
    0%{transform:scale(1);}
    25%{transform:scale(1.06);}
    50%{transform:scale(1);}
    75%{transform:scale(1.08);}
    100%{transform:scale(1);}
}

h1{
    color:white;
    margin-top:20px;
    font-size:30px;
    text-shadow:0 0 10px rgba(255,255,255,.8);
}

#text{
    color:white;
    font-size:18px;
    line-height:1.8;
    margin-top:20px;
    min-height:140px;
    padding:0 10px;
}

a{
    display:inline-block;
    margin-top:25px;
    padding:14px 35px;
    border-radius:50px;
    background:white;
    color:#ff4d88;
    text-decoration:none;
    font-weight:bold;
    font-size:18px;
    box-shadow:0 8px 20px rgba(255,255,255,.4);
    transition:.3s;
}

a:hover{
    transform:scale(1.08);
    background:#ff4d88;
    color:white;
}
</style>
</head>
<body>

<!-- Hearts -->
<div class="heart" style="left:5%;animation-duration:8s;"></div>
<div class="heart" style="left:15%;animation-duration:6s;"></div>
<div class="heart" style="left:28%;animation-duration:9s;"></div>
<div class="heart" style="left:40%;animation-duration:7s;"></div>
<div class="heart" style="left:55%;animation-duration:10s;"></div>
<div class="heart" style="left:70%;animation-duration:8s;"></div>
<div class="heart" style="left:82%;animation-duration:6s;"></div>
<div class="heart" style="left:95%;animation-duration:9s;"></div>

<!-- Sparkles -->
<div class="sparkle" style="top:10%;left:10%;">✨</div>
<div class="sparkle" style="top:20%;right:12%;">✨</div>
<div class="sparkle" style="bottom:20%;left:15%;">✨</div>
<div class="sparkle" style="bottom:15%;right:10%;">✨</div>

<div class="container">

    <div class="pic">
        <!-- PALITAN MO PHOTO -->
        <img src="mark1.jpg">
    </div>

    <h1>My Sunshine 💖</h1>

    <div id="text"></div>

    <a href="index2.html">Open My Heart ➜</a>

</div>

<script>
const msg = "Every day with you feels like a blessing... You are my sunshine, my peace, my happiness. Maria Khate Sunshine Martinez, thank you for existing. You make my world brighter, softer, and full of love. ❤️";
let i=0;
function type(){
    if(i < msg.length){
        document.getElementById("text").innerHTML += msg.charAt(i);
        i++;
        setTimeout(type,45);
    }
}
type();
</script>

</body>
</html>
