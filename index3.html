<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stay Forever</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff7eb3,#ffb6d9,#ffe8f3);
    position:relative;
}

/* Stars */
.star{
    position:absolute;
    color:white;
    font-size:18px;
    animation:twinkle 2s infinite;
}
@keyframes twinkle{
    0%,100%{opacity:.2;transform:scale(.8);}
    50%{opacity:1;transform:scale(1.3);}
}

/* Floating Hearts */
.heart{
    position:absolute;
    bottom:-20px;
    font-size:22px;
    animation:floatUp linear infinite;
    opacity:.8;
}
@keyframes floatUp{
    0%{transform:translateY(0);opacity:0;}
    20%{opacity:1;}
    100%{transform:translateY(-115vh);opacity:0;}
}

.box{
    width:92%;
    max-width:500px;
    padding:35px;
    border-radius:30px;
    text-align:center;
    background:rgba(255,255,255,.18);
    backdrop-filter:blur(14px);
    box-shadow:0 10px 40px rgba(0,0,0,.15);
    z-index:2;
    animation:fade .9s ease;
}

@keyframes fade{
    from{opacity:0;transform:translateY(30px);}
    to{opacity:1;transform:translateY(0);}
}

h1{
    color:white;
    font-size:34px;
    text-shadow:0 0 10px rgba(255,255,255,.8);
}

.sub{
    color:white;
    margin-top:8px;
    font-size:17px;
}

#msg{
    color:white;
    font-size:18px;
    line-height:1.9;
    margin-top:22px;
    min-height:180px;
}

.btns{
    margin-top:25px;
}

button,a{
    border:none;
    outline:none;
    text-decoration:none;
    display:inline-block;
    padding:14px 28px;
    margin:8px;
    border-radius:50px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

.yes{
    background:white;
    color:#ff4d88;
}

.no{
    background:#ff4d88;
    color:white;
    position:relative;
}

button:hover,a:hover{
    transform:scale(1.08);
}

.result{
    color:white;
    font-size:22px;
    margin-top:15px;
    font-weight:bold;
}
</style>
</head>
<body>

<!-- stars -->
<div class="star" style="top:8%;left:10%;">✨</div>
<div class="star" style="top:15%;right:15%;">✨</div>
<div class="star" style="bottom:18%;left:12%;">✨</div>
<div class="star" style="bottom:12%;right:10%;">✨</div>

<!-- hearts -->
<div class="heart" style="left:8%;animation-duration:8s;">💖</div>
<div class="heart" style="left:22%;animation-duration:6s;">💕</div>
<div class="heart" style="left:38%;animation-duration:9s;">💗</div>
<div class="heart" style="left:58%;animation-duration:7s;">💘</div>
<div class="heart" style="left:76%;animation-duration:10s;">💞</div>
<div class="heart" style="left:92%;animation-duration:8s;">💓</div>

<div class="box">

<h1>Stay Forever? 💍</h1>
<div class="sub">One question from my heart...</div>

<div id="msg"></div>

<div class="btns">
    <button class="yes" onclick="yesBtn()">YES ❤️</button>
    <button class="no" id="noBtn">NO 😜</button>
</div>

<div class="result" id="result"></div>

<a href="index4.html">Next Surprise ➜</a>

</div>

<script>
const text = "Mahal, if life gets hard, if days become heavy, if the world becomes too loud... will you still stay with me forever? Because if you stay, I promise to love you with all of my heart every single day. ❤️";
let i=0;

function type(){
    if(i < text.length){
        document.getElementById("msg").innerHTML += text.charAt(i);
        i++;
        setTimeout(type,40);
    }
}
type();

function yesBtn(){
    document.getElementById("result").innerHTML = "YAYYYY!! I LOVE YOU FOREVER MAHAL 💖🥰";
}

const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover",()=>{
    noBtn.style.position="absolute";
    noBtn.style.top=Math.random()*80 + "%";
    noBtn.style.left=Math.random()*70 + "%";
});
</script>

</body>
</html>
