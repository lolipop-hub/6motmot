<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open My Heart</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff8fc4,#ffc4df,#fff0f7);
    position:relative;
}

/* Floating Hearts */
.heart{
    position:absolute;
    bottom:-30px;
    width:20px;
    height:20px;
    background:#ff3d7a;
    transform:rotate(45deg);
    animation:rise linear infinite;
    opacity:.7;
}
.heart::before,
.heart::after{
    content:'';
    position:absolute;
    width:20px;
    height:20px;
    background:#ff3d7a;
    border-radius:50%;
}
.heart::before{top:-10px;left:0;}
.heart::after{left:-10px;top:0;}

@keyframes rise{
    0%{transform:translateY(0) rotate(45deg);opacity:0;}
    20%{opacity:.8;}
    100%{transform:translateY(-120vh) rotate(45deg);opacity:0;}
}

/* Main Card */
.card{
    width:92%;
    max-width:480px;
    padding:35px;
    border-radius:30px;
    text-align:center;
    background:rgba(255,255,255,.18);
    backdrop-filter:blur(14px);
    box-shadow:0 10px 40px rgba(0,0,0,.15);
    z-index:2;
    animation:show 1.5s ease;
}

@keyframes show{
    from{opacity:0;transform:scale(.8);}
    to{opacity:1;transform:scale(1);}
}

.bigHeart{
    font-size:75px;
    animation:beat 1s infinite;
}

@keyframes beat{
    0%{transform:scale(1);}
    50%{transform:scale(1.18);}
    100%{transform:scale(1);}
}

h1{
    color:white;
    font-size:32px;
    margin-top:10px;
    text-shadow:0 0 10px rgba(255,255,255,.8);
}

#letter{
    color:white;
    font-size:18px;
    line-height:1.9;
    margin-top:20px;
    min-height:220px;
}

a{
    display:inline-block;
    margin-top:25px;
    padding:14px 35px;
    border-radius:50px;
    background:white;
    color:#ff3d7a;
    text-decoration:none;
    font-size:18px;
    font-weight:bold;
    transition:.3s;
    box-shadow:0 8px 20px rgba(255,255,255,.4);
}

a:hover{
    transform:scale(1.08);
    background:#ff3d7a;
    color:white;
}
</style>
</head>
<body>

<!-- Hearts -->
<div class="heart" style="left:8%;animation-duration:8s;"></div>
<div class="heart" style="left:18%;animation-duration:6s;"></div>
<div class="heart" style="left:30%;animation-duration:9s;"></div>
<div class="heart" style="left:45%;animation-duration:7s;"></div>
<div class="heart" style="left:60%;animation-duration:10s;"></div>
<div class="heart" style="left:75%;animation-duration:8s;"></div>
<div class="heart" style="left:90%;animation-duration:6s;"></div>

<div class="card">

<div class="bigHeart">❤️</div>

<h1>Inside My Heart</h1>

<div id="letter"></div>

<a href="index3.html">Stay Forever ➜</a>

</div>

<script>
const message = "My heart belongs to only one person... and that is you, Mahal ko. No matter how many people I meet in this world, no one can replace the peace and happiness you give me. You are not just part of my life... you are my favorite reason to smile every day. If I could choose again and again, I would still choose you. Always you. Forever you. ❤️";

let i = 0;
function typing(){
    if(i < message.length){
        document.getElementById("letter").innerHTML += message.charAt(i);
        i++;
        setTimeout(typing,40);
    }
}
typing();
</script>

</body>
</html>
